<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
    <script>
        (() => {
            const raw = localStorage.getItem('dataSettings');
            if (raw && JSON.parse(raw).isDark) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/x-icon" href="assets/icons/hand-svg.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/hand-32px.png">
    <link rel="icon" type="image/png" sizes="168x168" href="assets/icons/hand-168px.png">
    <link rel="apple-touch-icon" href="assets/icons/hand-168px.png">
    <title>Гостелюбець</title>
</head>
<body>
    <div id="main-container" class="container display-flex align-items-center flex-direction-column">
        <div id="root"></div>
    </div>
    <script type="module" src="js/utils/loader.js"></script>
    <script type="module" src="js/router/router.js"></script>
</body>
</html>
